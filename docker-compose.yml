services:
  # 1. Laravel Application Server
  laravel-app:
    build:
      context: .
      dockerfile: docker/laravel/Dockerfile
    container_name: monitor_laravel
    volumes:
      - ./laravel-app:/var/www/html
      - laravel-vendor:/var/www/html/vendor
      - laravel-node-modules:/var/www/html/node_modules
      - shared-videos:/var/www/html/storage/app/public/videos
    ports:
      - "8000:80"
    environment:
      DB_TEST_DATABASE: ${DB_TEST_DATABASE:-video_monitor_test}
      PROCESSOR_API_TOKEN: ${PROCESSOR_API_TOKEN:-local-dev-processor-token}
      XDEBUG_MODE: ${XDEBUG_MODE:-debug,develop}
      XDEBUG_START_WITH_REQUEST: ${XDEBUG_START_WITH_REQUEST:-yes}
      XDEBUG_CLIENT_HOST: ${XDEBUG_CLIENT_HOST:-host.docker.internal}
      XDEBUG_CLIENT_PORT: ${XDEBUG_CLIENT_PORT:-9003}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      database:
        condition: service_healthy

  # 2. Python Video Processor
  python-processor:
    build: ./python-processor
    container_name: monitor_python
    restart: always  #Auto-Restart
    environment:
      PROCESSOR_API_BASE_URL: http://laravel-app/api
      PROCESSOR_API_TOKEN: ${PROCESSOR_API_TOKEN:-local-dev-processor-token}
      PROCESSOR_CAMERA_URL: ${PROCESSOR_CAMERA_URL:-}
      PROCESSOR_OUTPUT_DIR: /app/storage/videos
      PROCESSOR_REFRESH_SECONDS: ${PROCESSOR_REFRESH_SECONDS:-10}
    volumes:
      - ./python-processor:/app
      - shared-videos:/app/storage/videos
    depends_on:
      - laravel-app
      - database

  # 3. Postgres Database
  database:
    image: postgres:16
    container_name: monitor_db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: ${DB_DATABASE:-video_monitor}
      POSTGRES_TEST_DB: ${DB_TEST_DATABASE:-video_monitor_test}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./docker/database/init-test-database.sh:/docker-entrypoint-initdb.d/10-init-test-database.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
  laravel-vendor:
  laravel-node-modules:
  shared-videos: # Shares Python recordings with Laravel public storage
